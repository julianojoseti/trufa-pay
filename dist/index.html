<body>
  <div id="root"></div>
  <script>
    let lastCheck = Date.now();
    setInterval(() => {
      fetch('/index.html', { cache: 'no-store' })
        .then(r => r.text())
        .then(html => {
          if (html && html !== document.documentElement.outerHTML && Date.now() - lastCheck > 30000) {
            location.reload();
          }
        })
        .catch(() => {});
    }, 60000);
  </script>
